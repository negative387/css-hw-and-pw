<!-- Рівень 2: Логіка та Композиція (Фони та Градієнти)
Фокус: Взаємодія фонів, Box Model та прозорості.

3. «Оверлей з прозорістю»: Знайдіть будь-яке фото в інтернеті та додайте його як фонове зображення (background-image: url(...)) для .card-image. Використайте множинні фони: накладіть напівпрозорий темний градієнт поверх фотографії (використовуючи rgba або hsla у градієнті), щоб зробити зображення темнішим та стильнішим. Не забудьте background-size: cover.
-->

<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>LVL 2.3</title>
        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Underdog&display=swap"
            rel="stylesheet"
        />
        <style>
            html {
                font-size: 16px;
            }
            .article-card {
                width: 350px;
                padding: 24px;
                border-radius: 12px;
                background-color: #ffffff;
                box-shadow: 7px 5px 5px gray;
                line-height: 1.6;
            }
            .card-image {
                height: 150px;
                background-image:
                    linear-gradient(to right, rgba(128, 0, 128, 0.5), rgba(0, 0, 255, 0.5)),
                    url(https://images.meme-arsenal.com/37a97628dcebc1bdd413000f0b4e0628.jpg);
                background-size: cover;
            }
            .article-card h2 {
                font-size: 1.5rem;
                font-family: 'Reggae One', serif;
            }
            .article-card p {
                color: hsl(0, 0%, 20%);
                font-size: 1rem;
                font-family: 'Underdog', serif;
            }
            .article-card a {
                color: hsl(220, 90%, 50%);
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div class="article-card">
            <div class="card-image"></div>
            <h2>Заголовок</h2>
            <p>Короткий опис...</p>
            <a
                href="https://kostyl.dev/html-css/css-typography"
                target="_blank"
                >Читати далі</a
            >
        </div>
    </body>
</html>
