<!-- Рівень 1: Базовий (Фундамент тексту та кольору)
Фокус: Підключення шрифтів, одиниці виміру rem та базові кольори.

1. «Структура та Шрифти»: Створіть HTML-каркас: div з класом .article-card, всередині — заголовок h2, параграф p (короткий опис) та посилання a (Читати далі). Підключіть з Google Fonts два шрифти: один для заголовків (наприклад, Montserrat), інший для тексту (наприклад, Open Sans). Застосуйте їх через властивість font-family.
-->

<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>LVL 1.1</title>
        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Underdog&display=swap"
            rel="stylesheet"
        />
        <style>
            .article-card h2 {
                font-family: 'Reggae One', serif;
            }
            .article-card p {
                font-family: 'Underdog', serif;
            }
        </style>
    </head>
    <body>
        <div class="article-card">
            <h2>Заголовок</h2>
            <p>Короткий опис...</p>
            <a
                href="https://kostyl.dev/html-css/css-typography"
                target="_blank"
                >Читати далі</a
            >
        </div>
    </body>
</html>
