<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Student Cards</title>
    <link
      rel="stylesheet"
      href="style.css"
    />
  </head>
  <body>
    <div class="card card--white">
      <img
        class="card__img"
        src="https://preview.redd.it/that-one-86-rated-card-youve-been-searching-for-years-on-v0-iousu166mdpg1.jpeg?auto=webp&s=adc8dcfd303d1a5c93983e05e1054181fd0981d6"
        alt="Student avatar"
      />
      <h2 class="card__name">Овечко Йосип Семенович</h2>
      <p class="card__specialty">125 Архітектор КН-21</p>
      <span class="card__status card__status--successful">Успішний</span>
      <button class="card__button">Деталі</button>
    </div>

    <div class="card card--dark">
      <img
        class="card__img"
        src="https://preview.redd.it/that-one-86-rated-card-youve-been-searching-for-years-on-v0-iousu166mdpg1.jpeg?auto=webp&s=adc8dcfd303d1a5c93983e05e1054181fd0981d6"
        alt="Student avatar"
      />
      <h2 class="card__name">Цеглинський Нігослав Остапович</h2>
      <p class="card__specialty">171 Архітектор КН-21</p>
      <span class="card__status card__status--debtor">Боржник</span>
      <button class="card__button">Деталі</button>
    </div>
  </body>
</html>
