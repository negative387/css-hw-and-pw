<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Card Profile</title>
    <link
      rel="stylesheet"
      href="style.css"
    />
  </head>
  <body>
    <div class="background-container">
      <div class="profile-card">
        <img
          src="https://i.pinimg.com/474x/ed/34/a8/ed34a880883f1095561a73a820cc7d98.jpg"
          alt="Avatar"
          class="avatar"
        />
        <h2 class="name">
          Олена Розробник
          <div class="online-dot"></div>
        </h2>
        <p class="role">Frontend Engineer</p>
        <button class="btn-follow">Підписатися</button>
      </div>
    </div>
  </body>
</html>
